name: Setup pnpm/node/turbo-cache
description: Install pnpm and Node, restore the turbo cache, and install dependencies

inputs:
  pnpm-version:
    description: pnpm version to install
    required: true
  node-version:
    description: Node.js version to install
    required: true

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - name: Cache turbo
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json') }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ hashFiles('turbo.json') }}-
          turbo-${{ runner.os }}-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
