version: 2
updates:
  # JS/TS deps across the whole pnpm workspace (root + all packages/apps)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint"]
      storybook:
        patterns: ["storybook", "@storybook/*"]
      vitest:
        patterns: ["vitest*", "@vitejs/*"]
    ignore:
      # Storybook 8 -> 10 is a coordinated migration (all @storybook/* + the
      # storybook core + eslint-plugin-storybook + .storybook config move
      # together), not a routine dev-dep bump. Hold majors until we do it
      # deliberately; minors/patches within the current major still flow.
      - dependency-name: "storybook"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@storybook/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-storybook"
        update-types: ["version-update:semver-major"]
      # elliptic <=6.6.1 has an open advisory with NO patched release, so
      # Dependabot's security updater can never resolve it and errors on every
      # run. It's a deep transitive (build-tooling) dep; ignore it until an
      # upstream fix ships. Tracked in the transitive-overrides work (#220).
      - dependency-name: "elliptic"
    open-pull-requests-limit: 5
    labels: ["tooling"]

  # GitHub Actions themselves — auto-bumps pinned SHAs from #156
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["tooling"]
