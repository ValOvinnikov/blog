name: CI

on:
  # No `paths-ignore` here on purpose. Build/Lint/Test/Type-check/Typegen are
  # *required* status checks in the branch ruleset. A workflow skipped by path
  # filtering leaves its required checks "Pending" forever, which blocks any PR
  # that only touches the ignored paths (e.g. a `.claude/**` or docs-only PR)
  # from ever merging. Running CI on every PR is cheap and avoids that deadlock.
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: '22'

jobs:
  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Type-check
        run: pnpm type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Test
        run: pnpm test

  typegen:
    name: Typegen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Typegen
        working-directory: apps/cms
        run: pnpm exec sanity typegen generate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint, test, typegen]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: pnpm build
