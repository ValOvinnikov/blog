name: CI

on:
  # No `paths-ignore` here on purpose. Build/Lint/Test/Type-check/Typegen are
  # *required* status checks in the branch ruleset. A workflow skipped by path
  # filtering leaves its required checks "Pending" forever, which blocks any PR
  # that only touches the ignored paths (e.g. a `.claude/**` or docs-only PR)
  # from ever merging. Running CI on every PR is cheap and avoids that deadlock.
  pull_request:
    branches: [main]

permissions:
  contents: read

# A force-push/synchronize supersedes the running suite for the same ref —
# cancel it instead of paying for two full parallel runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: '22'
  # The Sanity project/dataset are not hardcoded in the repo — the Studio/CLI
  # config reads them from SANITY_STUDIO_*. Jobs that load that config (typegen,
  # build, migrations) need them present, so source them from repo-level
  # Variables (Settings → Secrets and variables → Actions → Variables):
  #   SANITY_STUDIO_PROJECT_ID, SANITY_STUDIO_DATASET.
  # The migrations dry-run connects to the real dataset, so these must be the
  # production values (project id is public, so a Variable — not a Secret — is fine).
  SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
  SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}

jobs:
  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Type-check
        run: pnpm type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Test
        run: pnpm test

  typegen:
    name: Typegen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Typegen
        working-directory: apps/cms
        run: pnpm exec sanity typegen generate

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Read-only guard against broken content migrations. Content is live in the
    # `production` dataset, so a malformed or un-runnable migration must not slip
    # through. `sanity migrations list` loads + registers every migration (fails
    # on import errors / bad defineMigration). When a read-only Sanity token is
    # configured (repo/org secret `SANITY_API_READ_TOKEN`), it additionally
    # dry-runs each migration against the dataset — this never mutates data
    # (`sanity migrations run` defaults to dry mode; `--no-dry-run` is never used
    # here). Actually applying a migration to production stays human-gated.
    env:
      SANITY_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate migrations load
        working-directory: apps/cms
        run: pnpm exec sanity migrations list

      - name: Dry-run migrations (read-only; requires SANITY_API_READ_TOKEN)
        if: ${{ env.SANITY_READ_TOKEN != '' }}
        working-directory: apps/cms
        env:
          # The Sanity CLI authenticates non-interactively from SANITY_AUTH_TOKEN.
          SANITY_AUTH_TOKEN: ${{ env.SANITY_READ_TOKEN }}
        run: |
          set -euo pipefail
          for dir in migrations/*/; do
            id="$(basename "${dir}")"
            echo "::group::dry-run ${id}"
            # Dry mode is the default — computes the diff, never writes.
            pnpm exec sanity migrations run "${id}"
            echo "::endgroup::"
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint, test, typegen]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: pnpm build
        # @blog/service validates its env at import time (Zod via
        # @t3-oss/env-core). CI has no Sanity env vars, so skip validation
        # here — the build doesn't fetch, and real validation still runs at
        # deploy time on Vercel where the vars are set. Pages tolerate a
        # missing client (service fetchers return an `ok: false` Result).
        env:
          SKIP_ENV_VALIDATION: 'true'
