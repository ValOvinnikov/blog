name: Dependency Review

on:
  # No path filter on purpose — same reasoning as ci.yml: a workflow skipped
  # by path filtering leaves any required status check "Pending" forever.
  # The action no-ops cheaply on PRs that don't touch the dependency graph.
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Start conservative to avoid noise: fail the PR only when it
          # introduces a dependency with a known high (or critical) severity
          # advisory. Complements Dependabot, which alerts/updates existing
          # deps but does not gate new ones entering via a PR.
          fail-on-severity: high
