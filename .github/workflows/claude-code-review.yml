name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Only review PRs that touch code or workflows. Path filtering is safe
    # HERE (unlike ci.yml) because claude-review is not a required status
    # check — a skipped run can't block a merge. Docs-only PRs skip the
    # ~3-minute AI review and its usage cost.
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.jsx'
      - '**/*.css'
      - '**/*.json'
      - '.github/workflows/**'

# A synchronize event supersedes the in-flight review of the same PR —
# cancel it rather than paying for two.
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Restrict to the repo owner only — this fires automatically on every PR
    # (including from forks on this public repo) and consumes Claude usage,
    # so without this filter any external PR would trigger a real run.
    if: github.event.pull_request.user.login == 'ValOvinnikov'

    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # write, not read: the action posts its review as a PR
      # comment/review using this job's GITHUB_TOKEN — confirmed against the
      # action's own docs, whose basic auto-review example requires
      # pull-requests: write. read-only here was silently failing every
      # run (is_error:true, permission_denials_count > 0, no comment
      # ever posted) — see #452.
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1.0.175
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Narrow, review-specific allowlist — not this repo's general
          # settings.json (#452 follow-up, reviewer-requested). The action's
          # own defaults already cover file reads, read-only git, and
          # comment management; the action's sanitized logs don't name which
          # calls were denied, but the 8 tool-call denials that broke the
          # original run (#452) are consistent with the `gh pr` calls needed
          # to read the PR and post the review, which DO need explicit
          # allowlisting. This mirrors
          # every official claude-code-action review example (basic auto
          # review, security-focused review, path-scoped review) — none of
          # them reuse a general settings file. No
          # git-push/gh-pr-create/gh-pr-edit/commit entries, so this stays
          # read + comment only, matching the reviewer subagent's local
          # read-only equivalent even combined with pull-requests: write
          # above.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # allowed_bots intentionally omitted: the action's default is to
          # trust no bots at all, which is correct here — nothing in this
          # review flow needs bot interaction. '*' (the prior setting)
          # widened trust to any bot's comments/events as agent input, and
          # the action's own docs flag it as risky ("prefer an explicit list
          # over '*'", "allowed bots are not checked for repository
          # permissions").
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
