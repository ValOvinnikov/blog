name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: '22'

jobs:
  claude:
    # Restrict to the repo owner only — this repo is public, and without an
    # actor check any commenter could trigger a real agent run against
    # github.actor's credentials/quota.
    if: |
      github.actor == 'ValOvinnikov' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets Claude push branches so it can open PRs
      pull-requests: write # lets Claude open/update PRs
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@37b464ce72700f7b2c5ff8d2db7fa7b15df792f5 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Reuse the repo's own tool allowlist (pnpm scripts, git read/commit,
          # etc.) so cloud runs don't need per-command approval for things
          # already vetted for local sessions.
          settings: .claude/settings.json

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Trigger-phrase model routing: "@claude-opus" runs Opus 4.8;
          # plain "@claude" (the default) runs Sonnet 5. "@claude-opus"
          # already contains the "@claude" substring, so the job's `if:`
          # trigger above fires for both without any change.
          #
          # git push / gh pr create are allowed here (cloud-only), not in the
          # shared .claude/settings.json — that file also governs interactive
          # local sessions, which should keep asking before every push/PR.
          claude_args: |
            --model ${{ (contains(github.event.comment.body, '@claude-opus') || contains(github.event.review.body, '@claude-opus') || contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus')) && 'claude-opus-4-8' || 'claude-sonnet-5' }}
            --allowedTools "Bash(git push:*),Bash(gh pr create:*),Bash(gh pr edit:*)"

