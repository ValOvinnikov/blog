name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: '22'

jobs:
  claude:
    # Restrict to the repo owner only — this repo is public, and without an
    # actor check any commenter could trigger a real agent run against
    # github.actor's credentials/quota.
    #
    # The actor check alone only gates *who triggers* a run, not *whose
    # content the agent reads as context*. Since this job has contents:write +
    # pull-requests:write, an untrusted user could plant an adversarial
    # issue/PR body that the agent later ingests when the owner @claude's that
    # thread. Each branch below additionally requires the underlying
    # issue/PR to be owner-authored (github.event.issue.user.login /
    # github.event.pull_request.user.login), closing that vector.
    if: |
      github.actor == 'ValOvinnikov' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.user.login == 'ValOvinnikov') ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && github.event.pull_request.user.login == 'ValOvinnikov') ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && github.event.pull_request.user.login == 'ValOvinnikov') ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && github.event.issue.user.login == 'ValOvinnikov')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # lets Claude push branches so it can open PRs
      pull-requests: write # lets Claude open/update PRs
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # Safe even though this job pushes branches: claude-code-action
          # configures its own git auth (embeds a fresh token in the remote
          # URL / a credential helper) and explicitly strips the credential
          # actions/checkout would otherwise persist. See
          # https://github.com/anthropics/claude-code-action/blob/main/src/github/operations/git-config.ts
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1.0.175
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Reuse the repo's own tool allowlist (pnpm scripts, git read/commit,
          # etc.) so cloud runs don't need per-command approval for things
          # already vetted for local sessions.
          settings: .claude/settings.json

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Trigger-phrase model routing: "@claude-opus" runs Opus 4.8;
          # plain "@claude" (the default) runs Sonnet 5. "@claude-opus"
          # already contains the "@claude" substring, so the job's `if:`
          # trigger above fires for both without any change.
          #
          # git push / gh pr create are allowed here (cloud-only), not in the
          # shared .claude/settings.json — that file also governs interactive
          # local sessions, which should keep asking before every push/PR.
          claude_args: |
            --model ${{ (contains(github.event.comment.body, '@claude-opus') || contains(github.event.review.body, '@claude-opus') || contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus')) && 'claude-opus-4-8' || 'claude-sonnet-5' }}
            --allowedTools "Bash(git push:*),Bash(gh pr create:*),Bash(gh pr edit:*)"

