name: Hooks

on:
  # No path filter on purpose — same reasoning as ci.yml / actionlint.yml: a
  # workflow skipped by path filtering leaves any required status check
  # "Pending" forever. Shellchecking and testing a handful of scripts is cheap
  # regardless of what the PR touches.
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hooks:
    name: Shellcheck + guard tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Shellcheck .claude/hooks
        # shellcheck is preinstalled on ubuntu-latest (same fact actionlint.yml
        # relies on for workflow run: blocks) — these standalone scripts aren't
        # inside any run: block, so actionlint's shellcheck pass never reaches
        # them.
        run: shellcheck .claude/hooks/*.sh

      - name: read-only-agent-guard.sh deny/allow matrix
        # Pins the cases hand-tested across #425's review rounds (see the test
        # file's own header) so a future edit can't silently reopen a bypass.
        run: bash .claude/hooks/read-only-agent-guard.test.sh

      - name: gate-bypass-guard.sh deny/allow matrix
        # Reuses the discarded first attempt's (#397, commit ecc1092) proven
        # ALLOW bank so a future edit can't silently reintroduce the
        # false-positive failure mode that got that attempt discarded — see
        # the test file's own header.
        run: sh .claude/hooks/gate-bypass-guard.test.sh

      - name: pre-bash-worktree-install-guard.sh deny/allow matrix
        # #459: pins the regex tokenizer's intended behavior (mutating pnpm
        # subcommands, flag-tolerant forms, compound-command segments) plus
        # the negative cases — see the test file's own header.
        run: sh .claude/hooks/pre-bash-worktree-install-guard.test.sh

      - name: test-writer-scope-guard.sh deny/allow matrix
        # #459: pins the *.test.ts(x)-only suffix check.
        run: bash .claude/hooks/test-writer-scope-guard.test.sh
