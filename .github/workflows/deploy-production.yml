name: Deploy Production

on:
  push:
    tags: ['v*']

permissions:
  contents: read

# Never cancel an in-flight production deploy.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: '22'
  VERCEL_CLI_VERSION: 48.0.0
  # `sanity build` (run by the verify job's `pnpm build`) loads sanity.cli.ts,
  # which requires these. Sourced from repo Variables like ci.yml; the
  # deploy-studio job overrides them with its environment-scoped values.
  SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
  SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
  # Vercel Remote Cache — lets verify replay task artifacts already built by PR
  # CI instead of rebuilding. No-op until TURBO_TOKEN/TURBO_TEAM are configured.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # A tag can point at ANY commit with no PR gate, so re-run the full suite on
  # the exact tagged commit before anything is promoted to production.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
      - name: Type-check
        run: pnpm type-check
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: 'true'

  # Apply any un-applied content migrations to production BEFORE new code is
  # served. `environment: production` gates this on the required reviewer (the
  # human check), and every step is guarded on the deploy token so the whole job
  # is a no-op until SANITY_DEPLOY_TOKEN is configured — safe to land ahead of
  # the console setup.
  migrate:
    name: Migrate prod content
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
      SANITY_STUDIO_DATASET: production
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
      # A backup on the ephemeral runner is not a backup — export the dataset and
      # upload it as an artifact BEFORE any mutation, so a bad migration is
      # recoverable.
      - name: Back up production dataset
        if: ${{ env.SANITY_AUTH_TOKEN != '' }}
        working-directory: apps/cms
        run: pnpm dataset:export "${RUNNER_TEMP}/prod-${GITHUB_REF_NAME}.tar.gz"
      - name: Upload backup artifact
        if: ${{ env.SANITY_AUTH_TOKEN != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sanity-prod-backup-${{ github.ref_name }}
          path: ${{ runner.temp }}/prod-${{ github.ref_name }}.tar.gz
          retention-days: 30
          if-no-files-found: error
      # Runs only un-applied migrations (dry -> run -> record in the
      # migrationState ledger), idempotent — a second run is a no-op. CI sets
      # CI=true which (with --yes) skips the interactive confirm; the approval
      # gate above is the real human check.
      - name: Apply pending migrations
        if: ${{ env.SANITY_AUTH_TOKEN != '' }}
        working-directory: apps/cms
        run: pnpm migrate:deploy --yes

  deploy-studio:
    name: Deploy prod Studio
    needs: [verify, migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
      SANITY_STUDIO_DATASET: production
      SANITY_STUDIO_HOSTNAME: valovinnikov-blog
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
      - name: Deploy Studio
        if: ${{ env.SANITY_AUTH_TOKEN != '' }}
        working-directory: apps/cms
        run: pnpm exec sanity deploy

  deploy-web:
    name: Deploy prod web
    needs: [verify, migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Org/project ids are not sensitive — they live as environment-scoped
      # Variables (not Secrets) so they stay inspectable in run logs.
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # pnpm + node on PATH so `vercel build` can install the workspace deps
      # (Vercel detects pnpm-lock.yaml and shells out to `pnpm`).
      - uses: ./.github/actions/setup
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
      # Vercel CLI runs its own `next build` with the project's Production env
      # vars pulled from Vercel (root directory apps/web is stored on the
      # project, so build resolves the monorepo workspaces correctly).
      - name: Deploy to Vercel (production)
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          set -euo pipefail
          # Without both ids the CLI silently auto-links to whatever project
          # matches the directory name — fail loudly instead.
          : "${VERCEL_ORG_ID:?empty — set the VERCEL_ORG_ID Variable on the production environment}"
          : "${VERCEL_PROJECT_ID:?empty — set the VERCEL_PROJECT_ID Variable on the production environment}"
          # npx (not `npm install -g`) keeps zizmor's ad-hoc-install audit
          # green; the package is cached after the first resolution.
          npx --yes "vercel@${VERCEL_CLI_VERSION}" pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes "vercel@${VERCEL_CLI_VERSION}" build --prod --token="$VERCEL_TOKEN"
          npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prebuilt --prod --token="$VERCEL_TOKEN"
